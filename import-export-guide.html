<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Export Guide - GBU Express</title>
    <meta name="description" content="Panduan lengkap seputar import, export, dan pengiriman barang internasional dari GBU Express.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            padding: 180px 0 60px;
            text-align: center;
            color: white;
            position: relative;
        }
        .guide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .guide-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: var(--transition-smooth);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .guide-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .guide-content {
            padding: 2rem;
            flex-grow: 1;
        }
        .guide-content h3 {
            font-size: 1.25rem;
            color: var(--dark-blue);
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        .guide-content p {
            color: var(--text-medium);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-blue);
            font-weight: 600;
            margin-top: 1rem;
        }
        .lang-toggle-container {
            display: inline-flex;
            align-items: center;
            margin-left: 15px;
        }
        .lang-toggle-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .lang-toggle-btn:hover {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }
        @media (max-width: 768px) {
            .lang-toggle-container {
                margin: 15px 0 0 0;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="index.html" class="logo-container" style="text-decoration: none;">
                    <img src="logo GBU.webp" alt="GBU Express Logo" class="logo-img">
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link" data-id="Home" data-en="Home">Home</a></li>
                <li><a href="index.html#services" class="nav-link" data-id="Services" data-en="Services">Services</a></li>
                <li><a href="import-export-guide.html" class="nav-link" style="color: var(--primary-blue);" data-id="Guide" data-en="Guide">Guide</a></li>
                <li><a href="gallery.html" class="nav-link" data-id="Gallery" data-en="Gallery">Gallery</a></li>
                <li><a href="index.html#about" class="nav-link" data-id="About" data-en="About">About</a></li>
                <li><a href="index.html#contact" class="nav-link" data-id="Contact" data-en="Contact">Contact</a></li>
                <li class="lang-toggle-container">
                    <button class="lang-toggle-btn" onclick="toggleLanguage()">
                        <i class="fas fa-globe"></i> <span id="lang-label">EN</span>
                    </button>
                </li>
            </ul>
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 style="font-family: var(--font-heading); font-size: 3rem; margin-bottom: 1rem;" data-id="Panduan Ekspor Impor" data-en="Import Export Guide">Import Export Guide</h1>
            <p style="font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin: 0 auto;" data-id="Kumpulan panduan, tips, dan informasi penting seputar layanan logistik, impor, dan ekspor." data-en="A collection of guides, tips, and essential information about logistics, import, and export services.">Kumpulan panduan, tips, dan informasi penting seputar layanan logistik, impor, dan ekspor.</p>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="guide-grid" id="article-container">
                <p>Sedang memuat daftar panduan...</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div style="text-align: center; padding-top: 2rem;">
                <p>&copy; 2026 GBU Express. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@sanity/client@latest/dist/sanityClient.browser.js"></script>
    <script src="script.js"></script>

    <script type="module">
        // 1. IMPORT CLIENT MENGGUNAKAN CDN SKYPACK (PASTI BERHASIL & AMAN)
        import { createClient } from 'https://cdn.skypack.dev/@sanity/client';

        // 2. INISIALISASI CLIENT
        const client = createClient({
            projectId: 'unekbzji', 
            dataset: 'production',
            useCdn: false,
            apiVersion: '2026-06-21'
        });

        let currentLang = localStorage.getItem('gbu_lang') || 'id';

        // PENTING: Pindahkan fungsi fetchArticles ke dalam scope module ini agar bisa membaca variabel 'client'
        async function fetchArticles() {
    const container = document.getElementById('article-container');
    
    try {
        // Menggunakan query sapu jagat agar semua data asli keluar tanpa tebak nama field
        const query = `*[_type == "artikel"]`;
        const articles = await client.fetch(query);

        if (!articles || articles.length === 0) {
            container.innerHTML = '<p>Belum ada artikel panduan yang diterbitkan.</p>';
            return;
        }

        container.innerHTML = '';

        articles.forEach(article => {
            const card = document.createElement('a');
            card.className = 'guide-card';

            // Ambil paragraf pertama dari konten sebagai deskripsi otomatis karena field deskripsiId kosong
            const dapatkanDeskripsiOtomatis = (blocks) => {
                if (!blocks || blocks.length === 0) return 'Klik untuk membaca selengkapnya...';
                const balokTeks = blocks.find(b => b._type === 'block' && b.children);
                return balokTeks ? balokTeks.children.map(c => c.text).join('') : 'Klik untuk membaca selengkapnya...';
            };

            const deskripsiId = dapatkanDeskripsiOtomatis(article.kontenId);
            const deskripsiEn = dapatkanDeskripsiOtomatis(article.kontenEn);

            const judulId = article.judulId || 'Tanpa Judul';
            const judulEn = article.judulEn || 'Untitled';
            const slugId = article.slugId?.current || '';
            const slugEn = article.slugEn?.current || '';

            if (currentLang === 'id') {
                card.href = `detail-guide.html?slug=${slugId}`;
                card.innerHTML = `
                    <div class="guide-content">
                        <h3 data-id="${judulId}" data-en="${judulEn}">${judulId}</h3>
                        <p>${deskripsiId.substring(0, 150)}...</p>
                        <span class="read-more">
                            <span data-id="Baca Selengkapnya" data-en="Read More">Baca Selengkapnya</span> 
                            <i class="fas fa-arrow-right"></i>
                        </span>
                    </div>
                `;
            } else {
                card.href = `detail-guide.html?slug=${slugEn}`;
                card.innerHTML = `
                    <div class="guide-content">
                        <h3 data-id="${judulId}" data-en="${judulEn}">${judulEn}</h3>
                        <p>${deskripsiEn.substring(0, 150)}...</p>
                        <span class="read-more">
                            <span data-id="Baca Selengkapnya" data-en="Read More">Read More</span> 
                            <i class="fas fa-arrow-right"></i>
                        </span>
                    </div>
                `;
            }
            container.appendChild(card);
        });

    } catch (error) {
        console.error('Gagal mengambil data dari Sanity:', error);
        container.innerHTML = '<p>Gagal memuat daftar panduan. Silakan coba lagi nanti.</p>';
    }
}

        function updateDOMText() {
            const translatableElements = document.querySelectorAll('[data-id][data-en]');
            translatableElements.forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
            document.getElementById('lang-label').textContent = currentLang === 'id' ? 'EN' : 'ID';
            document.documentElement.lang = currentLang;
        }

        // Daftarkan fungsi toggle ke window agar bisa diklik dari HTML tombol navbar
        window.toggleLanguage = function() {
            currentLang = currentLang === 'id' ? 'en' : 'id';
            localStorage.setItem('gbu_lang', currentLang);
            updateDOMText();
            fetchArticles();
        }

        document.addEventListener("DOMContentLoaded", () => {
            updateDOMText();
            fetchArticles();
        });
    </script>
</body>
</html>
